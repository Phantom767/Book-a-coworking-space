version: '3.8'

services:
  coworking-db:
    image: postgres:16 
    container_name: coworking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: coworking_booking_db
    ports:
      - "5433:5432"
    volumes:
      - coworking_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d coworking_booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  coworking_data: